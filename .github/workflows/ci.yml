name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  smoke:
    name: Smoke test (proxy boots, /healthz returns 200)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e .
      - name: Start the proxy in background
        shell: bash
        run: |
          python -m hermes_openai_proxy --host 127.0.0.1 --port 18765 &
          PROXY_PID=$!
          # Wait up to 15 seconds for the proxy to come up
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:18765/healthz >/dev/null 2>&1; then
              echo "proxy is up after ${i}*0.5s"
              break
            fi
            sleep 0.5
          done
          # Test /healthz
          curl -sf http://127.0.0.1:18765/healthz
          echo
          # Test 404 path returns the right body shape
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18765/does-not-exist)
          if [ "$HTTP_STATUS" != "404" ]; then
            echo "expected 404 from unknown path, got $HTTP_STATUS"
            exit 1
          fi
          # Stop the proxy
          kill $PROXY_PID 2>/dev/null || true
      - name: Cleanup
        if: always()
        shell: bash
        run: |
          pkill -f "hermes_openai_proxy" 2>/dev/null || true