# Example ~/.hermes/config.yaml for hermes-openai-proxy
#
# This file is OPTIONAL. The proxy will auto-detect your default model
# from the first credentialled provider in ~/.hermes/.env if you omit
# this section.
#
# Only override `model:` / `ask:` if you want a specific default that
# differs from "first credentialled provider's first model".

# --- The default model the proxy uses when a client doesn't specify one.
# model:
#   default: MiniMax-M3
#   provider: minimax

# --- Ask-specific override (used by Hermes's `ask` CLI).
# ask:
#   default_model: gpt-4o-mini
#   default_provider: openai

# --- Other unrelated Hermes sections can live in the same file.
# provider: minimax
# providers:
#   minimax:
#     api_key_env: MINIMAX_API_KEY
# temperature: 0.7